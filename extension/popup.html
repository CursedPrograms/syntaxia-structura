<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { width: 260px; background: #1e1e2e; color: #cdd6f4;
         font-family: 'Segoe UI', sans-serif; padding: 1rem; margin: 0; }
  h2   { color: #89b4fa; margin: 0 0 0.5rem; font-size: 1rem; }
  p    { color: #a6adc8; font-size: 0.85rem; margin: 0.4rem 0; }
  code { background: #313244; padding: 0.1rem 0.3rem; border-radius: 3px;
         font-family: Consolas, monospace; font-size: 0.8rem; }
  a    { color: #89b4fa; }
  hr   { border: none; border-top: 1px solid #313244; margin: 0.75rem 0; }
</style>
</head>
<body>
  <h2>Syntaxia Reader</h2>
  <p>Renders <code>.syn</code> documents in Chrome.</p>
  <hr>
  <p>Open any <code>.syn</code> file or URL — this extension detects and renders it automatically.</p>
  <hr>
  <p>Part of the <strong>Structura</strong> ecosystem.<br>
     Runtime: <a href="#" id="ver">v1.0</a></p>
  <script>
    document.getElementById('ver').textContent = 'v1.0.0';
  </script>
</body>
</html>
